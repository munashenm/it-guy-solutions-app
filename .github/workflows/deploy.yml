name: 🚀 Deploy to app.itguysa.co.za

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 📂 Sync files
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.itguysa.co.za
          username: itguysaco
          password: ${{ secrets.FTP_PASSWORD }}
          # The path on your server. Adjust if it's different (e.g., /public_html/app.itguysa.co.za)
          server-dir: /public_html/app.itguysa.co.za/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            backend/.env
            backend/.env.production
            deploy-itguy.ps1
            itguy-deploy.zip
            deploy.zip
            backups/**
            deploy_temp/**
