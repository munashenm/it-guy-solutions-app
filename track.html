<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Tracking - IT Guy Solutions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: radial-gradient(circle at top right, #1e2235, #0f111a);
            padding: 20px;
        }
        .track-container {
            max-width: 450px;
            width: 100%;
        }
        .logo-section {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo-icon {
            font-size: 56px;
            color: var(--primary);
            margin-bottom: 8px;
        }
        .track-card {
            padding: 32px;
            border-top: 4px solid var(--primary);
        }
        #track-job-result {
            margin-top: 24px;
        }
        .status-update {
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="dark-theme">

    <div class="track-container">
        <div class="logo-section">
            <span class="material-symbols-outlined logo-icon">terminal</span>
            <h1 style="font-size: 2rem; margin: 0;">IT Guy<span class="highlight">Solutions</span></h1>
            <p style="color: var(--text-secondary); margin-top: 8px;">Public Service Tracking Portal</p>
        </div>

        <div class="glass-card track-card">
            <h2 style="margin-bottom: 8px; text-align: center;">Track Your Job</h2>
            <p style="color: var(--text-secondary); text-align: center; margin-bottom: 24px; font-size: 0.9rem;">
                Enter your unique Job ID or Field ID to see the latest progress.
            </p>

            <form id="track-form" style="margin-bottom: 24px;">
                <div class="form-group">
                    <label>Job Reference Number</label>
                    <input type="text" id="track-id" class="form-control" placeholder="e.g. JOB-1001" style="text-align: center; font-size: 1.2rem; text-transform: uppercase;" required>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; padding: 14px; font-size: 1rem;">
                    <span class="material-symbols-outlined">analytics</span> Check Status
                </button>
            </form>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 24px;">
                <a href="client.html" class="btn-secondary" style="justify-content: center; font-size: 0.85rem; border-color: var(--primary); color: var(--primary);">
                    <span class="material-symbols-outlined">person</span> Customer Login
                </a>
                <a href="https://itguysa.co.za" id="btn-website" class="btn-secondary" style="justify-content: center; font-size: 0.85rem;">
                    <span class="material-symbols-outlined">language</span> Back to Website
                </a>
            </div>

            <div id="track-job-result"></div>
        </div>

        <div style="display: flex; flex-direction: column; gap: 12px; margin-top: 24px; align-items: center;">
            <p style="color: #666; font-size: 0.85rem;">Need assistance with your repair?</p>
            <div style="display: flex; gap: 16px;">
                <a href="tel:+27875501813" id="link-phone" class="btn-icon" style="color: var(--success); background: rgba(0, 184, 148, 0.1); padding: 12px; border-radius: 50%;" title="Call Us"><span class="material-symbols-outlined">call</span></a>
                <a href="https://wa.me/27658663103" id="link-whatsapp" class="btn-icon" style="color: #25D366; background: rgba(37, 211, 102, 0.1); padding: 12px; border-radius: 50%;" title="WhatsApp Us"><span class="material-symbols-outlined">chat</span></a>
                <a href="mailto:support@itguysa.co.za" id="link-email" class="btn-icon" style="color: var(--primary); background: rgba(108, 92, 231, 0.1); padding: 12px; border-radius: 50%;" title="Email Support"><span class="material-symbols-outlined">mail</span></a>
            </div>
        </div>

        <p style="text-align: center; color: #444; font-size: 0.75rem; margin-top: 40px; border-top: 1px solid rgba(255,255,255,0.03); padding-top: 20px;">
            &copy; 2026 IT Guy Solutions. All Rights Reserved.
        </p>
    </div>

    <!-- Core Dependencies -->
    <script src="js/local-db.js?v=2.5.2"></script>
    <script src="js/firebase-init.js?v=2.5.2"></script>
    <script src="js/track.js?v=2.5.2"></script>
</body>
</html>
