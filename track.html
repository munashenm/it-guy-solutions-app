<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Tracking - IT Guy Solutions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: radial-gradient(circle at top right, #1e2235, #0f111a);
            padding: 20px;
        }
        .track-container {
            max-width: 450px;
            width: 100%;
        }
        .logo-section {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo-icon {
            font-size: 56px;
            color: var(--primary);
            margin-bottom: 8px;
        }
        .track-card {
            padding: 32px;
            border-top: 4px solid var(--primary);
        }
        #track-job-result {
            margin-top: 24px;
        }
        .status-update {
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="dark-theme">

    <div class="track-container">
        <div class="logo-section">
            <span class="material-symbols-outlined logo-icon">terminal</span>
            <h1 style="font-size: 2rem; margin: 0;">IT Guy<span class="highlight">Solutions</span></h1>
            <p style="color: var(--text-secondary); margin-top: 8px;">Public Service Tracking Portal</p>
        </div>

        <div class="glass-card track-card">
            <h2 style="margin-bottom: 8px; text-align: center;">Track Your Job</h2>
            <p style="color: var(--text-secondary); text-align: center; margin-bottom: 24px; font-size: 0.9rem;">
                Enter your unique Job ID or Field ID to see the latest progress.
            </p>

            <form id="track-form">
                <div class="form-group">
                    <label>Job Reference Number</label>
                    <input type="text" id="track-id" class="form-control" placeholder="e.g. JOB-1001" style="text-align: center; font-size: 1.2rem; text-transform: uppercase;" required>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; padding: 14px; font-size: 1rem;">
                    <span class="material-symbols-outlined">analytics</span> Check Status
                </button>
            </form>

            <div id="track-job-result"></div>
        </div>

        <p style="text-align: center; color: #666; font-size: 0.8rem; margin-top: 32px;">
            &copy; 2024 IT Guy Solutions. All Rights Reserved.<br>
            <a href="index.html" style="color: var(--primary); text-decoration: none; margin-top: 8px; display: inline-block;">Go to Staff Portal</a>
        </p>
    </div>

    <!-- Core Dependencies -->
    <script src="js/local-db.js"></script>
    <script src="js/firebase-init.js"></script>
    <script src="js/track.js"></script>
</body>
</html>
