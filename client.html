<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Customer Portal - IT Guy Solutions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="css/style.css">
    <style>
        .client-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: rgba(15, 17, 26, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .client-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .client-logo .logo-icon {
            font-size: 32px;
            color: var(--primary);
        }
        .client-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }
        #login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: radial-gradient(circle at top right, #1e2235, #0f111a);
        }
        .login-card {
            max-width: 400px;
            width: 100%;
            padding: 40px;
            text-align: center;
        }
    </style>
</head>
<body class="dark-theme">

    <!-- Login Screen -->
    <div id="login-screen">
        <div class="glass-card login-card">
            <div class="logo-section" style="margin-bottom: 32px;">
                <span class="material-symbols-outlined logo-icon" style="font-size: 56px; color: var(--primary); margin-bottom: 8px;">terminal</span>
                <h1 style="font-size: 2rem; margin: 0;">IT Guy<span class="highlight">Portal</span></h1>
                <p style="color: var(--text-secondary); margin-top: 8px;">Customer Self-Service Area</p>
            </div>

            <div id="customer-login-form">
                <p style="color: var(--text-secondary); text-align: center; margin-bottom: 24px; font-size: 0.95rem;">
                    Sign in using your mobile number associated with your repairs.
                </p>
                
                <div id="phone-input-section">
                    <div class="form-group">
                        <label style="text-align: left; display: block;">Phone Number</label>
                        <input type="tel" id="login-phone" class="form-control" placeholder="e.g. +27 82 123 4567" style="text-align: center; font-size: 1.1rem;">
                    </div>
                    <button class="btn-primary" style="width: 100%; justify-content: center; padding: 14px; margin-top: 12px;" onclick="authSystem.sendOTP()">
                        Send Verification Code
                    </button>
                    <div id="recaptcha-container" style="margin-top: 16px; display: flex; justify-content: center;"></div>
                </div>
                
                <div id="otp-input-section" class="hidden">
                    <div class="form-group">
                        <label style="text-align: left; display: block;">Verification Code</label>
                        <input type="text" id="login-otp" class="form-control" placeholder="Enter 6-digit code" style="text-align: center; font-size: 1.1rem; letter-spacing: 4px;">
                    </div>
                    <button class="btn-primary" style="width: 100%; justify-content: center; padding: 14px;" onclick="authSystem.verifyOTP()">
                        Verify & Sign In
                    </button>
                    <button class="btn-icon" style="width: 100%; margin-top: 16px; color: var(--text-secondary);" onclick="authSystem.resetPhoneInput()">
                        Change Phone Number
                    </button>
                </div>

                <div style="margin-top: 32px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 24px;">
                    <a href="index.html" style="color: #666; text-decoration: none; font-size: 0.85rem;">Are you Staff? Go to Employee Login</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Portal Content -->
    <div id="portal-content" class="hidden">
        <header class="client-header">
            <div class="client-logo">
                <span class="material-symbols-outlined logo-icon">terminal</span>
                <h2 style="margin: 0; font-size: 1.4rem;">IT Guy<span class="highlight">Portal</span></h2>
            </div>
            <div style="display: flex; gap: 16px; align-items: center;">
                <div id="client-info" style="text-align: right; margin-right: 12px;">
                    <div id="client-name" style="font-weight: 600; color: #fff;">...</div>
                    <div id="client-email" style="font-size: 0.8rem; color: #a0a0a0;">...</div>
                </div>
                <button class="btn-secondary" onclick="authSystem.logout()" style="padding: 8px 16px;">Sign Out</button>
            </div>
        </header>

        <main class="client-container">
            <div id="client-content">
                <!-- Client.js renders here -->
            </div>
        </main>
    </div>

    <!-- Modals -->
    <div id="modal-container" class="modal-overlay hidden">
        <div id="modal-body" class="modal-content-wrapper"></div>
    </div>

    <!-- Tooltip / Toaster -->
    <div id="notification-bar" class="hidden"></div>

    <!-- Scripts -->
    <script src="js/local-db.js"></script>
    <script src="js/firebase-init.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/client.js"></script>
    <script src="js/pdf.js"></script>
    
    <script>
        // Mocking the 'app' functions that client.js expects
        window.app = {
            state: {
                jobs: [],
                quotations: [],
                invoices: []
            },
            showModal(html) {
                const container = document.getElementById('modal-container');
                const body = document.getElementById('modal-body');
                body.innerHTML = html;
                container.classList.remove('hidden');
            },
            closeModal() {
                document.getElementById('modal-container').classList.add('hidden');
            },
            async getNextSequence(prefix) {
                // Mock sequence
                return prefix + '-' + (Math.floor(Math.random() * 9000) + 1000);
            },
            executeDocumentAction(action, type, id, data) {
                if(window.pdfSystem) {
                    window.pdfSystem.generate(type, id, data);
                }
            },
            logActivity(type, message) {
                console.log(`[Activity] ${type}: ${message}`);
            }
        };

        // Initialize Portal
        document.addEventListener('DOMContentLoaded', () => {
            // Listen for data ready
            window.addEventListener('firebase-ready', () => {
                this.syncDataAndRender();
            });

            // Handle Auth changes
            window.fbAuth.onAuthStateChanged((user) => {
                if (user) {
                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('portal-content').classList.remove('hidden');
                    
                    document.getElementById('client-name').textContent = user.email.split('@')[0];
                    document.getElementById('client-email').textContent = user.email;
                    
                    window.client.init();
                } else {
                    document.getElementById('login-screen').classList.remove('hidden');
                    document.getElementById('portal-content').classList.add('hidden');
                }
            });
        });

        async function syncDataAndRender() {
            try {
                const jSnap = await window.fbDb.collection('jobs').get();
                window.app.state.jobs = jSnap.docs.map(d => d.data());
                
                const qSnap = await window.fbDb.collection('quotations').get();
                window.app.state.quotations = qSnap.docs.map(d => d.data());
                
                const iSnap = await window.fbDb.collection('invoices').get();
                window.app.state.invoices = iSnap.docs.map(d => d.data());
                
                if(window.client && window.authSystem.currentUser) window.client.render();
            } catch(e) {
                console.error("Data sync failed", e);
            }
        }
    </script>
</body>
</html>
